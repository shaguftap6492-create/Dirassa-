name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p DIRASSA-Fee-Record/gradle/wrapper
          curl -L \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o DIRASSA-Fee-Record/gradle/wrapper/gradle-wrapper.jar
          echo "JAR downloaded: $(ls -lh DIRASSA-Fee-Record/gradle/wrapper/)"

      - name: Make gradlew executable
        run: chmod +x DIRASSA-Fee-Record/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: DIRASSA-Fee-Record
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIRASSA-Fee-Record-debug-apk
          path: DIRASSA-Fee-Record/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
